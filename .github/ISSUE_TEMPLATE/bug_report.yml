name: Bug report
description: 报告插件安装、运行或 hook 行为问题
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈问题。请不要在 issue 中粘贴 API key、token、密码或其他敏感信息。
  - type: input
    id: plugin
    attributes:
      label: 插件名称
      description: 出问题的插件名称，例如 explanatory-output-style。
      placeholder: explanatory-output-style
    validations:
      required: true
  - type: input
    id: codex-version
    attributes:
      label: Codex 版本
      description: 如果不确定，可以填写“不确定”。
      placeholder: codex --version
    validations:
      required: false
  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请写出从安装到触发问题的步骤。
      placeholder: |
        1. codex plugin marketplace add ...
        2. codex plugin add ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      description: 可以粘贴错误信息，但请先移除敏感信息。
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: 其他信息
      description: 相关日志、截图或你已经尝试过的排查方式。
    validations:
      required: false
