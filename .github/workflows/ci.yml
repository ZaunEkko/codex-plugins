name: CI

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main

jobs:
  plugin-validation:
    name: Plugin validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile explanatory-output-style hook
        run: python -m py_compile plugins/explanatory-output-style/hooks/session_start.py

      - name: Validate explanatory-output-style hook output
        run: python plugins/explanatory-output-style/hooks/session_start.py >/dev/null

      - name: Run explanatory-output-style tests
        run: python -m unittest tests.test_explanatory_output_style
